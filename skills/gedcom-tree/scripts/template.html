<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title><!--__TITLE__--></title>
<style>
  :root{
    --bg:#f4f1ea; --panel:#fffdf8; --ink:#2b2620; --muted:#7c7266;
    --line:#c9beac; --male:#cfe3f2; --male-b:#5a86a8; --female:#f6dbe4;
    --female-b:#b0637f; --unknown:#e7e1d5; --unknown-b:#a89e8c;
    --focus:#f4c95d; --focus-b:#b8860b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,
    "Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;color:var(--ink);
    background:var(--bg);overflow:hidden}
  #privacy-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:60;
    padding:6px 16px;font-size:.8rem;line-height:1.35;text-align:center;
    background:#7c2d12;color:#fed7aa;border-bottom:1px solid #9a3412}
#privacy-banner.on{display:block}
#privacy-banner.share{background:#14532d;color:#bbf7d0;border-bottom-color:#166534}
body.has-banner #bar{top:30px}
#bar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;
    align-items:center;gap:12px;padding:0 16px;background:var(--panel);
    border-bottom:1px solid var(--line);z-index:10;
    box-shadow:0 1px 4px rgba(0,0,0,.06)}
  #bar h1{font-size:15px;margin:0;font-weight:600;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;max-width:30vw}
  #bar .sub{color:var(--muted);font-size:12px;white-space:nowrap}
  #search{position:relative;margin-left:auto}
  #search input{width:230px;padding:7px 10px;border:1px solid var(--line);
    border-radius:8px;background:#fff;font-size:13px;color:var(--ink)}
  #results{position:absolute;top:38px;right:0;width:300px;max-height:340px;
    overflow:auto;background:#fff;border:1px solid var(--line);border-radius:8px;
    box-shadow:0 6px 20px rgba(0,0,0,.15);display:none;z-index:20}
  #results div{padding:8px 10px;cursor:pointer;font-size:13px;
    border-bottom:1px solid #f0eae0}
  #results div:last-child{border-bottom:none}
  #results div:hover{background:#f4efe4}
  #results .yrs{color:var(--muted);font-size:11px;margin-left:6px}
  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);
    border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer}
  .btn:hover{background:#f4efe4}
  #ctl{position:fixed;bottom:16px;left:16px;display:flex;gap:6px;z-index:10}
  #ctl .btn{width:38px;height:38px;font-size:18px;line-height:1;padding:0}
  #gens{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:10px;background:var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:6px 12px;z-index:10;
    font-size:12px;color:var(--muted)}
  #gens label{display:flex;align-items:center;gap:5px}
  #gens select{font-size:12px;padding:2px 4px}
  #legend{position:fixed;bottom:16px;right:16px;display:flex;gap:14px;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:8px 12px;z-index:10;font-size:12px}
  #legend span{display:inline-flex;align-items:center;gap:6px}
  #legend i{width:8px;height:16px;border-radius:3px}
  .sw-m{background:var(--male-b)}
  .sw-f{background:var(--female-b)}
  .sw-u{background:var(--unknown-b)}
  .sw-c{background:var(--focus-b)}
  #stage{position:absolute;inset:52px 0 0 0;cursor:grab}
  #stage.drag{cursor:grabbing}
  svg{width:100%;height:100%;display:block;touch-action:none}
  .link{fill:none;stroke:var(--line);stroke-width:1.6}
  /* Cards: soft card + colored left accent stripe by sex. */
  .card{cursor:pointer}
  .card .bg{fill:var(--panel);stroke:var(--line);stroke-width:1.2}
  .card .stripe{stroke:none}
  .m .stripe{fill:var(--male-b)}
  .f .stripe{fill:var(--female-b)}
  .u .stripe{fill:var(--unknown-b)}
  .card:hover .bg{fill:#fff}
  .card:hover .halo{opacity:1}
  .halo{fill:none;stroke:var(--focus-b);stroke-width:2;opacity:0;
    transition:opacity .12s}
  .focus .bg{stroke:var(--focus-b);stroke-width:2.2}
  .focus .stripe{fill:var(--focus-b)}
  .card .nm{font-size:12.5px;font-weight:600;fill:var(--ink)}
  .focus .nm{font-weight:700}
  .card .yr{font-size:10.5px;fill:var(--muted)}
  #empty{position:absolute;inset:52px 0 0 0;display:none;align-items:center;
    justify-content:center;color:var(--muted);font-size:15px;text-align:center}
  #tip{position:fixed;pointer-events:none;background:#2b2620;color:#fff;
    font-size:12px;padding:6px 9px;border-radius:6px;opacity:0;z-index:30;
    max-width:260px;transition:opacity .1s;line-height:1.45}
  #tip b{color:#f4c95d}
  /* Info badge: sits in a reserved right gutter, so it never covers the name.
     Hidden until the card is hovered; always shown on the focus card. */
  .info{cursor:pointer;opacity:0;transition:opacity .12s}
  .card:hover .info,.focus .info{opacity:1}
  .info circle{fill:#fff;stroke:var(--muted);stroke-width:1.2}
  .info:hover circle{stroke:var(--focus-b);fill:#fffaf0}
  .info text{font-size:11px;font-weight:700;fill:var(--muted);
    pointer-events:none}
  .info:hover text{fill:var(--focus-b)}
  /* Detail side panel */
  #panel{position:fixed;top:52px;right:0;bottom:0;width:380px;max-width:92vw;
    background:var(--panel);border-left:1px solid var(--line);z-index:40;
    box-shadow:-4px 0 24px rgba(0,0,0,.14);transform:translateX(100%);
    transition:transform .18s ease;display:flex;flex-direction:column}
  #panel.open{transform:translateX(0)}
  #panel header{display:flex;align-items:flex-start;gap:8px;padding:16px 16px 12px;
    border-bottom:1px solid var(--line)}
  #panel header .pn{font-size:17px;font-weight:700;line-height:1.25;flex:1}
  #panel header .py{color:var(--muted);font-size:13px;margin-top:2px}
  #pclose{border:none;background:none;font-size:22px;line-height:1;cursor:pointer;
    color:var(--muted);padding:0 2px}
  #pclose:hover{color:var(--ink)}
  #pbody{overflow:auto;padding:14px 16px 28px;font-size:13px;line-height:1.5}
  #pbody h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--muted);margin:18px 0 7px;font-weight:700}
  #pbody h3:first-child{margin-top:0}
  #pbody .row{margin:3px 0}
  #pbody .k{color:var(--muted)}
  #pbody a{color:#3a6ea5;word-break:break-word}
  #pbody .note{background:#faf6ec;border:1px solid #ece3d1;border-radius:8px;
    padding:10px 12px;margin:7px 0;word-break:break-word}
  #pbody .note p{margin:0 0 7px}
  #pbody .note p:last-child{margin-bottom:0}
  #pbody .note .lead{font-weight:600;color:var(--ink)}
  #pbody .note .warn{display:block;margin:7px 0 0;padding:6px 9px;
    background:#fbe7e2;border-left:3px solid #c9744f;border-radius:5px;
    color:#8a3f22;font-size:12.5px}
  #pbody .note .cite{display:block;margin:7px 0 0;padding-top:6px;
    border-top:1px dashed #e3d8c2;color:var(--muted);font-size:12px}
  #pbody .note .cite b{color:var(--ink);font-weight:600}
  #pbody .chip{display:inline-block;font-size:10.5px;font-weight:700;
    letter-spacing:.02em;padding:2px 8px;border-radius:10px;margin:0 6px 6px 0;
    text-transform:uppercase}
  .st-proven{background:#d9efd6;color:#2f6b31}
  .st-probable{background:#fdf0cf;color:#8a6d1a}
  .st-possible{background:#fde4cf;color:#9a5a1e}
  .st-unproven{background:#eee;color:#777}
  .st-version{background:#e6e3f2;color:#544a86}
  #pbody .src{border-left:3px solid var(--line);padding:2px 0 2px 10px;margin:7px 0}
  #pbody .src .ti{font-weight:600}
  #pbody .rel{display:inline-block;background:#fff;border:1px solid var(--line);
    border-radius:7px;padding:3px 9px;margin:3px 6px 3px 0;cursor:pointer;
    font-size:12px}
  #pbody .rel:hover{background:#f4efe4}
  #pbody .doc{display:block;margin:4px 0}
  #pbody .muted{color:var(--muted)}
  #pbody .muted{font-size:11.5px;margin:2px 0 6px}
  #pbody details>summary{cursor:pointer;color:var(--muted);font-size:12px;
    margin:6px 0}
</style>
</head>
<body>
<div id="privacy-banner" role="note"></div>
<div id="bar">
  <h1 id="title">Tree</h1>
  <span class="sub" id="counts"></span>
  <div id="search">
    <input id="q" type="text" data-i18n-ph="search_ph" autocomplete="off">
    <div id="results"></div>
  </div>
</div>

<div id="stage">
  <svg id="svg"><g id="root"></g></svg>
</div>
<div id="empty" data-i18n="empty">No data to display.</div>

<div id="ctl">
  <button class="btn" id="zin" data-i18n-title="zoom_in">+</button>
  <button class="btn" id="zout" data-i18n-title="zoom_out">−</button>
  <button class="btn" id="zfit" data-i18n-title="fit" style="font-size:14px">⤢</button>
</div>

<div id="gens">
  <label><span data-i18n="ancestors">Ancestors</span>
    <select id="up">
      <option>0</option><option>1</option><option>2</option>
      <option selected>3</option><option>4</option><option>5</option>
      <option>6</option>
    </select>
  </label>
  <label><span data-i18n="descendants">Descendants</span>
    <select id="down">
      <option>0</option><option>1</option><option selected>2</option>
      <option>3</option><option>4</option><option>5</option><option>6</option>
    </select>
  </label>
</div>

<div id="legend">
  <span><i class="sw-c"></i><span data-i18n="focus">focused</span></span>
  <span><i class="sw-m"></i><span data-i18n="male">male</span></span>
  <span><i class="sw-f"></i><span data-i18n="female">female</span></span>
  <span><i class="sw-u"></i><span data-i18n="unknown">?</span></span>
</div>

<div id="tip"></div>

<aside id="panel" aria-hidden="true">
  <header>
    <div>
      <div class="pn" id="p-name"></div>
      <div class="py" id="p-years"></div>
    </div>
    <button id="pclose" data-i18n-title="close">×</button>
  </header>
  <div id="pbody"></div>
</aside>

<script>
const DATA = /*__DATA__*/null;

(function(){
  "use strict";
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("svg");
  const root = document.getElementById("root");
  const stage = document.getElementById("stage");
  const tip = document.getElementById("tip");

  // Interface strings (localized by the generator). Fall back to the key name so
  // a missing string is obvious rather than blank.
  const STR = (DATA && DATA.i18n) || {};
  const T = k => (k in STR ? STR[k] : k);
  document.documentElement.lang = (DATA && DATA.lang) || "ru";

  // Fill every element tagged with data-i18n / data-i18n-title / data-i18n-ph.
  function applyStaticI18n(){
    document.querySelectorAll("[data-i18n]").forEach(el => {
      el.textContent = T(el.getAttribute("data-i18n"));
    });
    document.querySelectorAll("[data-i18n-title]").forEach(el => {
      el.title = T(el.getAttribute("data-i18n-title"));
    });
    document.querySelectorAll("[data-i18n-ph]").forEach(el => {
      el.placeholder = T(el.getAttribute("data-i18n-ph"));
    });
  }
  applyStaticI18n();

  // Privacy banner — driven by the mode computed in Python (no client-side hiding).
  (function(){
    var mode = DATA && DATA.privacy && DATA.privacy.mode;
    if(mode === "private" || mode === "share"){
      var b = document.getElementById("privacy-banner");
      b.textContent = T(mode === "share" ? "privacy_share" : "privacy_private");
      b.className = "on" + (mode === "share" ? " share" : "");
      document.body.classList.add("has-banner");
    }
  })();

  if(!DATA || !DATA.people || !Object.keys(DATA.people).length){
    document.getElementById("empty").style.display = "flex";
    return;
  }

  const P = DATA.people, F = DATA.families;
  document.getElementById("title").textContent = T("title") + " — " + DATA.meta.file;
  document.getElementById("counts").textContent =
    DATA.counts.people + " " + T("people") + " · " +
    DATA.counts.families + " " + T("families");

  let focus = DATA.focus;
  let genUp = 3, genDown = 2;

  // Layout geometry.
  const CARD_W = 160, CARD_H = 56, H_GAP = 24, V_GAP = 98, SP_GAP = 12;
  const STRIPE = 6;              // width of the coloured sex accent stripe
  const GUTTER = 22;             // reserved space on the right for the ⓘ badge
  const PAD_L = STRIPE + 10;     // left text inset (after the stripe)

  const norm = s => String(s || "").toLowerCase();
  function years(p){
    const b = p.birth, d = p.death;
    if(b && d) return b + "–" + d;
    if(b) return T("born_prefix") + b;
    if(d) return T("died_prefix") + d;
    return "";
  }
  const cls = p => p.sex === "M" ? "m" : p.sex === "F" ? "f" : "u";
  function trunc(str, n){
    str = str || "";
    return str.length > n ? str.slice(0, n - 1) + "…" : str;
  }
  // Measure text against a pixel budget with a hidden SVG probe and trim with an
  // ellipsis so left-aligned names never spill into the badge gutter.
  const _probe = (function(){
    const t = document.createElementNS(NS, "text");
    t.setAttribute("class", "nm");
    t.setAttribute("visibility", "hidden");
    return t;
  })();
  function fitText(str, maxW, size, bold){
    str = str || "";
    if(!_probe.isConnected) root.appendChild(_probe);
    _probe.style.fontWeight = bold ? "600" : "400";
    _probe.textContent = str;
    if(_probe.getComputedTextLength() <= maxW) return str;
    let lo = 0, hi = str.length;
    while(lo < hi){
      const mid = (lo + hi + 1) >> 1;
      _probe.textContent = str.slice(0, mid) + "…";
      if(_probe.getComputedTextLength() <= maxW) lo = mid; else hi = mid - 1;
    }
    return str.slice(0, lo) + "…";
  }

  function parentsFam(id){
    const p = P[id]; if(!p) return null;
    for(const fid of p.famc){ if(F[fid]) return F[fid]; }
    return null;
  }
  function spouseFams(id){
    const p = P[id]; if(!p) return [];
    return p.fams.map(fid => F[fid]).filter(Boolean);
  }

  /* --------------------------------------------------------------------- *
   * Layout: a tidy chart centred on `focus`.                              *
   *   - descendants downward (genDown levels), parents centred on kids    *
   *   - ancestors upward (genUp levels), pedigree spread                  *
   * --------------------------------------------------------------------- */
  let nodes, links, nextX;

  function mkNode(id, y, kind){
    return { id, y, kind, x: 0 };
  }

  // Build the descendant subtree of `id`. `nextX` is a shared left-to-right
  // cursor tracking the next free x-slot; every card (person + spouses) that is
  // placed advances it, so siblings and their sub-trees never overlap.
  function buildDown(id, depth, key, seen){
    if(seen.has(id)) return null;         // avoid loops / double subtrees
    seen.add(id);
    const node = mkNode(id, depth * V_GAP, "person");
    nodes.set(key, node);

    // Gather spouse-units and lay out this couple's children first, so the
    // parent block can be centred over them.
    const spouseUnits = [];
    const kidNodes = [];
    const blockStart = nextX;          // left edge of this subtree
    for(const fam of spouseFams(id)){
      const other = fam.husb === id ? fam.wife : fam.husb;
      const unit = { fam, other, otherKey: null };
      if(depth < genDown){
        for(const c of fam.chil){
          const ck = key + ">" + c;
          const cn = buildDown(c, depth + 1, ck, seen);
          if(cn) kidNodes.push(cn);
        }
      }
      spouseUnits.push(unit);
    }
    node._spouses = spouseUnits;

    // How wide is the couple's own row (the person + every spouse card)?
    let coupleCards = 1;
    for(const u of spouseUnits){ if(u.other && P[u.other]) coupleCards++; }
    const coupleW = coupleCards * CARD_W + (coupleCards - 1) * SP_GAP;

    if(kidNodes.length){
      // Centre the couple row over the span of its children.
      const kidsLeft = kidNodes[0].x;
      const kidsRight = kidNodes[kidNodes.length - 1].x + CARD_W;
      const kidsCenter = (kidsLeft + kidsRight) / 2;
      node.x = kidsCenter - coupleW / 2;
      // If the couple row is wider than the children block, it may spill left
      // of where the block started and collide with the previous sibling.
      // Shift the whole thing right so it never crosses blockStart.
      if(node.x < blockStart){
        const shift = blockStart - node.x;
        node.x += shift;
        for(const kn of collectSubtree(key)) kn.x += shift;
        nextX += shift;
      }
    } else {
      node.x = nextX;
    }

    // Place spouse cards to the right of the person and advance the cursor
    // past the whole couple row so the next sibling starts clear of it.
    let ox = node.x + CARD_W + SP_GAP;
    for(const u of spouseUnits){
      if(u.other && P[u.other]){
        const sk = key + "~" + u.other;
        const sn = mkNode(u.other, node.y, "spouse");
        sn.x = ox;
        nodes.set(sk, sn);
        u.otherKey = sk;
        ox += CARD_W + SP_GAP;
      }
      // Links from couple down to each child.
      if(depth < genDown){
        for(const c of u.fam.chil){
          const cn = nodes.get(key + ">" + c);
          if(cn) links.push({ from: node, to: cn });
        }
      }
    }
    // Cursor must clear the right edge of the couple row *and* the children.
    const coupleRight = node.x + coupleW;
    nextX = Math.max(nextX, coupleRight) + H_GAP;
    return node;
  }

  // Every node strictly inside the subtree rooted at `rootKey`. Child keys are
  // `rootKey + ">" + …` and spouse keys `…+"~"+…`, so a prefix test on the two
  // separators identifies all descendants (children, their spouses, grandkids).
  function collectSubtree(rootKey){
    const out = [];
    for(const [k, n] of nodes){
      if(k === rootKey) continue;
      if(k.startsWith(rootKey + ">") || k.startsWith(rootKey + "~")) out.push(n);
    }
    return out;
  }

  function buildUp(id, depth, key, xCenter, span){
    const fam = parentsFam(id);
    if(!fam || depth > genUp) return;
    const parents = [];
    if(fam.husb && P[fam.husb]) parents.push(fam.husb);
    if(fam.wife && P[fam.wife]) parents.push(fam.wife);
    if(!parents.length) return;
    const y = -depth * V_GAP;
    const childNode = nodes.get(key);
    const half = span / 2;
    parents.forEach((pid, idx) => {
      const pkey = key + "^" + idx + pid;
      const pn = mkNode(pid, y, "anc");
      pn.x = parents.length === 1 ? xCenter
           : xCenter + (idx === 0 ? -half : half);
      nodes.set(pkey, pn);
      if(childNode) links.push({ from: pn, to: childNode });
      buildUp(pid, depth + 1, pkey, pn.x, span / 2);
    });
  }

  function layout(){
    nodes = new Map();
    links = [];
    nextX = 0;
    const focusNode = buildDown(focus, 0, "F:" + focus, new Set());
    if(focusNode){
      const span = (CARD_W + H_GAP) * Math.pow(1.9, Math.max(0, genUp - 1));
      buildUp(focus, 1, "F:" + focus, focusNode.x, span);
    }
  }

  /* --------------------------------------------------------------------- *
   * Render                                                                *
   * --------------------------------------------------------------------- */
  let bounds = null, scale = 1, tx = 0, ty = 0;

  function apply(){
    root.setAttribute("transform",
      "translate(" + tx + "," + ty + ") scale(" + scale + ")");
  }

  function fitView(){
    if(!bounds) return;
    const vw = stage.clientWidth, vh = stage.clientHeight;
    scale = Math.min(vw / bounds.w, vh / bounds.h, 1.4);
    tx = (vw - bounds.w * scale) / 2 - bounds.x * scale;
    ty = (vh - bounds.h * scale) / 2 - bounds.y * scale;
    apply();
  }

  function render(){
    layout();
    while(root.firstChild) root.removeChild(root.firstChild);

    let minX = 1e9, maxX = -1e9, minY = 1e9, maxY = -1e9;
    for(const n of nodes.values()){
      minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x + CARD_W);
      minY = Math.min(minY, n.y); maxY = Math.max(maxY, n.y + CARD_H);
    }

    // Links.
    const gl = document.createElementNS(NS, "g");
    root.appendChild(gl);
    for(const lk of links){
      const a = lk.from, b = lk.to;
      const x1 = a.x + CARD_W / 2, y1 = a.y + CARD_H;
      const x2 = b.x + CARD_W / 2, y2 = b.y;
      const my = (y1 + y2) / 2;
      const path = document.createElementNS(NS, "path");
      path.setAttribute("d",
        "M" + x1 + "," + y1 + " C" + x1 + "," + my + " " +
        x2 + "," + my + " " + x2 + "," + y2);
      path.setAttribute("class", "link");
      gl.appendChild(path);
    }

    // Cards.
    for(const n of nodes.values()){
      const p = P[n.id]; if(!p) continue;
      const g = document.createElementNS(NS, "g");
      const isFocus = (n.id === focus && n.kind === "person" && n.y === 0);
      g.setAttribute("class", "card " + cls(p) + (isFocus ? " focus" : ""));
      g.setAttribute("transform", "translate(" + n.x + "," + n.y + ")");

      // Card background (soft), a coloured left accent stripe, and a hover halo.
      const bg = document.createElementNS(NS, "rect");
      bg.setAttribute("class", "bg");
      bg.setAttribute("width", CARD_W); bg.setAttribute("height", CARD_H);
      bg.setAttribute("rx", 10); bg.setAttribute("ry", 10);
      g.appendChild(bg);

      const stripe = document.createElementNS(NS, "path");
      stripe.setAttribute("class", "stripe");
      // Rounded-left stripe hugging the card's left edge.
      const r = 10;
      stripe.setAttribute("d",
        "M" + r + ",0 H" + STRIPE + " V" + CARD_H + " H" + r +
        " a" + r + "," + r + " 0 0 1 " + (-r) + "," + (-r) +
        " V" + r + " a" + r + "," + r + " 0 0 1 " + r + "," + (-r) + " Z");
      g.appendChild(stripe);

      const halo = document.createElementNS(NS, "rect");
      halo.setAttribute("class", "halo");
      halo.setAttribute("x", -2); halo.setAttribute("y", -2);
      halo.setAttribute("width", CARD_W + 4); halo.setAttribute("height", CARD_H + 4);
      halo.setAttribute("rx", 12); halo.setAttribute("ry", 12);
      g.appendChild(halo);

      // Name (left-aligned, clipped before the badge gutter) and life years.
      const textW = CARD_W - PAD_L - GUTTER;
      const nm = document.createElementNS(NS, "text");
      nm.setAttribute("class", "nm");
      nm.setAttribute("x", PAD_L); nm.setAttribute("y", 24);
      nm.textContent = fitText(p.name, textW, 12.5, true);
      g.appendChild(nm);

      const yr = document.createElementNS(NS, "text");
      yr.setAttribute("class", "yr");
      yr.setAttribute("x", PAD_L); yr.setAttribute("y", 40);
      yr.textContent = years(p);
      g.appendChild(yr);

      g.addEventListener("click", e => { e.stopPropagation(); setFocus(n.id); });
      g.addEventListener("mouseenter", e => showTip(e, p));
      g.addEventListener("mousemove", moveTip);
      g.addEventListener("mouseleave", hideTip);

      // Info badge in the reserved right gutter (opens the detail panel).
      if(hasDetails(n.id)){
        const info = document.createElementNS(NS, "g");
        info.setAttribute("class", "info");
        info.setAttribute("transform",
          "translate(" + (CARD_W - GUTTER / 2 - 2) + "," + (CARD_H / 2) + ")");
        const ic = document.createElementNS(NS, "circle");
        ic.setAttribute("r", 8.5);
        info.appendChild(ic);
        const it = document.createElementNS(NS, "text");
        it.setAttribute("text-anchor", "middle");
        it.setAttribute("y", 3.5);
        it.textContent = "i";
        info.appendChild(it);
        info.addEventListener("click", e => {
          e.stopPropagation(); hideTip(); openPanel(n.id);
        });
        g.appendChild(info);
      }
      root.appendChild(g);
    }

    const pad = 70;
    bounds = { x: minX - pad, y: minY - pad,
               w: (maxX - minX) + pad * 2, h: (maxY - minY) + pad * 2 };
    fitView();
  }

  function setFocus(id){
    if(!P[id]) return;
    focus = id;
    render();
  }

  /* --------------------------------------------------------------------- *
   * Tooltip                                                               *
   * --------------------------------------------------------------------- */
  function showTip(e, p){
    let html = "<b>" + esc(p.name) + "</b>";
    const y = years(p);
    if(y) html += "<br>" + esc(y);
    if(p.place) html += "<br>" + esc(p.place);
    if(p.occ) html += "<br>" + esc(p.occ);
    const hint = hasDetails(p.id) ? T("hint_center_info") : T("hint_center");
    html += "<br><span style='color:#bbb'>" + esc(hint) + "</span>";
    tip.innerHTML = html;
    tip.style.opacity = "1";
    moveTip(e);
  }
  function moveTip(e){
    tip.style.left = (e.clientX + 14) + "px";
    tip.style.top = (e.clientY + 14) + "px";
  }
  function hideTip(){ tip.style.opacity = "0"; }
  function esc(s){
    return String(s).replace(/[&<>]/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  /* --------------------------------------------------------------------- *
   * Detail panel                                                          *
   * --------------------------------------------------------------------- */
  const DET = DATA.details || {};
  const panel = document.getElementById("panel");
  const pbody = document.getElementById("pbody");

  function detailOf(id){ return DET[id] || null; }
  function hasDetails(id){
    const d = detailOf(id);
    if(!d) return false;
    return (d.notes && d.notes.length) || (d.sources && d.sources.length) ||
      (d.events && d.events.length) ||
      (d.occupations && d.occupations.length) ||
      (d.residences && d.residences.length) ||
      (d.documents && d.documents.length) ||
      (d.links && ((d.links.urls||[]).length || (d.links.scans||[]).length));
  }

  // Only allow safe link targets (block javascript:, data:, etc.). Accepts web
  // URLs, mailto:, and file references — relative vault paths as well as
  // absolute local paths (turned into file:// so a double-click opens them).
  function safeUrl(u){
    u = String(u || "").trim();
    if(!u) return "";
    if(/^(https?:\/\/|mailto:|file:\/\/)/i.test(u)) return u;
    if(/^[a-zA-Z]:[\\/]/.test(u)) return "file:///" + u.replace(/\\/g, "/"); // Windows
    if(u.startsWith("/")) return "file://" + u;                              // POSIX abs
    if(/^(\.{0,2}\/|materials\/|skany\/|[\w.\-]+\/)/.test(u)) return u;      // relative
    return "";
  }
  function el(tag, cls, txt){
    const e = document.createElement(tag);
    if(cls) e.className = cls;
    if(txt != null) e.textContent = txt;   // textContent = XSS-safe
    return e;
  }
  function linkEl(href, text){
    const safe = safeUrl(href);
    if(!safe) return el("span", null, text || href);
    const a = el("a", null, text || href);
    a.href = safe; a.target = "_blank"; a.rel = "noopener noreferrer";
    return a;
  }
  // Map a note's status vocabulary to a chip {label, cls}. Recognises the
  // English tags plus the Russian free-text variants used in real research
  // notes ("версия", "гипотеза", "реконструкция", …).
  function statusOf(note){
    const t = note || "";
    let m = /\b(PROVEN|PROBABLE-STRONG|PROBABLE|POSSIBLE|UNPROVEN)\b/i.exec(t);
    if(m){
      const s = m[1].toUpperCase();
      const base = s.startsWith("PROVEN") ? "proven"
        : s.startsWith("PROBABLE") ? "probable"
        : s.startsWith("POSSIBLE") ? "possible" : "unproven";
      return { label: s.replace("-", " "), cls: "st-" + base };
    }
    if(/\bнегативн\w*\s+результат/i.test(t) || /\bnegative result\b/i.test(t))
      return { label: T("status_negative"), cls: "st-unproven" };
    if(/\b(верси\w*|гипотез\w*|реконструкци\w*|предположительн\w*)\b/i.test(t) ||
       /\b(hypothes\w*|reconstruction|conjectur\w*)\b/i.test(t))
      return { label: T("status_version"), cls: "st-version" };
    return null;
  }
  function statusChip(note){
    const s = statusOf(note);
    return s ? el("span", "chip " + s.cls, s.label) : null;
  }
  function isChangelog(note){ return /^\s*\[CHANGELOG\]/.test(note || ""); }

  // Turn one raw note string into readable DOM: unwrap MyHeritage <p> HTML,
  // drop the trailing "Статус: …" (shown as a chip instead), pull "Источник:"
  // into a citation footer and "⚠️ …" into a callout, and split the rest into
  // paragraphs. All text goes in via textContent — never innerHTML.
  function renderNote(raw){
    const box = el("div", "note");
    const chip = statusChip(raw);
    if(chip) box.appendChild(chip);

    let text = String(raw || "");
    // Unwrap embedded HTML notes: paragraph breaks first, then strip any tags.
    const hadHtml = /<\/?(p|br|div)\b/i.test(text);
    text = text.replace(/<\s*br\s*\/?>/gi, "\n")
               .replace(/<\/\s*p\s*>/gi, "\n\n")
               .replace(/<[^>]+>/g, "")
               .replace(/&nbsp;/gi, " ")
               .replace(/&amp;/gi, "&").replace(/&lt;/gi, "<").replace(/&gt;/gi, ">");

    // Peel off a trailing "Статус: …"/"Status: …" sentence (shown as the chip).
    text = text.replace(/(^|[.\s])(?:Статус|Status)[^.]*\.?\s*$/i, "$1").trim();

    // Split off a citation tail ("Источник:"/"Source:", opt. "Скан:"/"Scan:").
    let cite = "";
    const cm = /(?:^|[\s.])((?:Источник|Скан|Source|Scan)\s*:\s.*)$/is.exec(text);
    if(cm){ cite = cm[1].trim(); text = text.slice(0, cm.index).trim(); }

    // Pull out ⚠️ warning sentences into their own callouts.
    const warns = [];
    text = text.replace(/⚠️\s*([^⚠]*?)(?=(?:\s[А-ЯA-Z][а-яa-z]{3,}\s*:)|$)/gu,
      (all, w) => { const s = w.trim(); if(s) warns.push(s); return " "; }).trim();

    // Body paragraphs: split on blank lines (from HTML) or keep as one block.
    const paras = (hadHtml ? text.split(/\n{2,}/) : [text])
      .map(s => s.replace(/\s+/g, " ").trim()).filter(Boolean);
    for(const para of paras) box.appendChild(el("p", null, para));

    for(const w of warns){
      const wn = el("span", "warn");
      wn.appendChild(document.createTextNode("⚠️ " + w));
      box.appendChild(wn);
    }
    if(cite){
      const c = el("span", "cite");
      const cl = /^(Источник|Скан|Source|Scan)\s*:/i.exec(cite);
      if(cl){
        c.appendChild(el("b", null, cl[0]));
        c.appendChild(document.createTextNode(cite.slice(cl[0].length)));
      } else {
        c.appendChild(document.createTextNode(cite));
      }
      box.appendChild(c);
    }
    return box;
  }

  function section(title){ const h = el("h3", null, title); pbody.appendChild(h); return h; }

  function openPanel(id){
    const p = P[id], d = detailOf(id);
    if(!p) return;
    document.getElementById("p-name").textContent = p.name || "?";
    let sub = years(p);
    if(p.place) sub += (sub ? " · " : "") + p.place;
    document.getElementById("p-years").textContent = sub;
    pbody.innerHTML = "";   // safe: only static reset

    // Facts
    const facts = [];
    if(d && d.birth){
      const b = d.birth;
      if(b.date || b.place)
        facts.push([T("fact_birth"), [b.date, b.place].filter(Boolean).join(", ")]);
    }
    if(d && d.death){
      const dd = d.death;
      const parts = [dd.date, dd.place].filter(Boolean).join(", ");
      if(parts || dd.cause)
        facts.push([T("fact_death"), parts + (dd.cause ? " (" + dd.cause + ")" : "")]);
    }
    if(facts.length){
      section(T("sec_facts"));
      for(const [k, v] of facts){
        const row = el("div", "row");
        row.appendChild(el("span", "k", k + ": "));
        row.appendChild(document.createTextNode(v));
        pbody.appendChild(row);
      }
    }

    // Occupations
    if(d && d.occupations && d.occupations.length){
      section(T("sec_occupations"));
      for(const o of d.occupations){
        const t = o.title + (o.place ? " (" + o.place + ")" : "");
        pbody.appendChild(el("div", "row", t));
      }
    }

    // Residences
    if(d && d.residences && d.residences.length){
      const rows = d.residences.filter(r =>
        r.date || r.place || r.address || r.phone || r.email);
      if(rows.length){
        section(T("sec_residence"));
        for(const r of rows){
          const bits = [r.date, r.place, r.address, r.phone, r.email]
            .filter(Boolean).join(" · ");
          pbody.appendChild(el("div", "row", bits));
        }
      }
    }

    // Notes (with status chips; changelog folded away)
    if(d && d.notes && d.notes.length){
      const real = d.notes.filter(n => !isChangelog(n));
      const logs = d.notes.filter(isChangelog);
      if(real.length){
        section(T("sec_notes"));
        for(const n of real) pbody.appendChild(renderNote(n));
      }
      if(logs.length){
        const det = document.createElement("details");
        det.appendChild(el("summary", null,
          T("changelog") + " (" + logs.length + ")"));
        for(const n of logs) det.appendChild(el("div", "note muted", n));
        pbody.appendChild(det);
      }
    }

    // Sources
    if(d && d.sources && d.sources.length){
      const srcs = d.sources.filter(s =>
        s.title || s.author || s.page || s.text || s.url);
      if(srcs.length){
        section(T("sec_sources"));
        for(const s of srcs){
          const box = el("div", "src");
          const head = [s.author, s.title].filter(Boolean).join(" — ");
          if(head) box.appendChild(el("div", "ti", head));
          // QUAY is the submitter's own assessment, not a GPS proof status.
          if(s.quay){
            const chip = el("span", "chip", "QUAY " + s.quay);
            chip.title = T("quay_note");
            box.appendChild(chip);
          }
          if(s.url) box.appendChild(linkEl(s.url, s.url));
          else if(s.page) box.appendChild(el("div", null, s.page));
          if(s.text) box.appendChild(el("div", "muted", s.text));
          pbody.appendChild(box);
        }
      }
    }

    // Documents / scans / external links
    const docs = (d && d.documents) || [];        // OBJE/FILE attachments
    const urls = (d && d.links && d.links.urls) || [];
    const scans = (d && d.links && d.links.scans) || [];
    const evUrls = ((d && d.events) || []).filter(e => e.url).map(e => e.url);
    const allUrls = Array.from(new Set(urls.concat(evUrls)));
    // Avoid listing a scan twice if it's also an attached OBJE/FILE.
    const docPaths = new Set(docs.map(x => x.path));
    const extraScans = scans.filter(s => !docPaths.has(s));
    function docIcon(path, form){
      const s = (form || path || "").toLowerCase();
      if(/\.(png|jpe?g|gif|tif?f|bmp)$/.test(s) || /jpe?g|png|image/.test(s)) return "🖼️";
      if(/\.pdf$/.test(s) || s === "pdf") return "📕";
      if(/\.(md|markdown|txt|rtf|docx?)$/.test(s) || /txt|md|doc/.test(s)) return "📝";
      return "📄";
    }
    if(docs.length || extraScans.length || allUrls.length){
      section(T("sec_documents"));
      for(const doc of docs){
        const name = doc.title || doc.path.split(/[\\/]/).pop();
        const w = el("span", "doc");
        w.appendChild(document.createTextNode(docIcon(doc.path, doc.form) + " "));
        w.appendChild(linkEl(doc.path, name));
        pbody.appendChild(w);
      }
      for(const s of extraScans){
        const name = s.split("/").pop();
        const w = el("span", "doc");
        w.appendChild(document.createTextNode("🖼️ "));
        w.appendChild(linkEl(s, name));
        pbody.appendChild(w);
      }
      for(const u of allUrls){
        const w = el("span", "doc");
        w.appendChild(document.createTextNode("🔗 "));
        w.appendChild(linkEl(u, u));
        pbody.appendChild(w);
      }
    }

    // Relatives (click to re-centre)
    function relRow(title, arr){
      if(!arr || !arr.length) return;
      section(title);
      for(const r of arr){
        const b = el("span", "rel", r.name + (r.role === "HUSB" ? " (" + T("role_father") + ")"
          : r.role === "WIFE" ? " (" + T("role_mother") + ")" : ""));
        b.addEventListener("click", () => { setFocus(r.id); openPanel(r.id); });
        pbody.appendChild(b);
      }
    }
    relRow(T("sec_parents"), d && d.parents);
    relRow(T("sec_spouses"), d && d.spouses);
    relRow(T("sec_children"), d && d.children);

    // Associates (ASSO/RELA): social/evidentiary links, NOT pedigree edges.
    if(d && d.associates && d.associates.length){
      section(T("sec_associates"));
      const hint = el("div", "muted", T("associates_note"));
      pbody.appendChild(hint);
      for(const a of d.associates){
        const label = a.relation
          ? a.name + " — " + a.relation
          : a.name;
        const b = el("span", "rel", label);
        if(a.direction === "inbound") b.title = T("assoc_inbound");
        b.addEventListener("click", () => { setFocus(a.id); openPanel(a.id); });
        pbody.appendChild(b);
      }
    }

    // Re-centre button
    section("");
    const rc = el("span", "rel", T("recenter"));
    rc.addEventListener("click", () => { setFocus(id); });
    pbody.appendChild(rc);

    panel.classList.add("open");
    panel.setAttribute("aria-hidden", "false");
  }

  function closePanel(){
    panel.classList.remove("open");
    panel.setAttribute("aria-hidden", "true");
  }
  document.getElementById("pclose").addEventListener("click", closePanel);
  document.addEventListener("keydown", e => {
    if(e.key === "Escape") closePanel();
  });

  /* --------------------------------------------------------------------- *
   * Pan / zoom                                                            *
   * --------------------------------------------------------------------- */
  let dragging = false, sx = 0, sy = 0, stx = 0, sty = 0;
  stage.addEventListener("mousedown", e => {
    if(e.target.closest(".card")) return;
    dragging = true; stage.classList.add("drag");
    sx = e.clientX; sy = e.clientY; stx = tx; sty = ty;
  });
  window.addEventListener("mousemove", e => {
    if(!dragging) return;
    tx = stx + (e.clientX - sx); ty = sty + (e.clientY - sy); apply();
  });
  window.addEventListener("mouseup", () => {
    dragging = false; stage.classList.remove("drag");
  });
  stage.addEventListener("wheel", e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    zoomAt(e.clientX, e.clientY - 52, factor);
  }, { passive: false });

  function zoomAt(cx, cy, factor){
    const ns = Math.max(0.15, Math.min(3, scale * factor));
    const k = ns / scale;
    tx = cx - (cx - tx) * k;
    ty = cy - (cy - ty) * k;
    scale = ns; apply();
  }
  function zoomCenter(factor){
    zoomAt(stage.clientWidth / 2, stage.clientHeight / 2, factor);
  }

  document.getElementById("zin").onclick = () => zoomCenter(1.2);
  document.getElementById("zout").onclick = () => zoomCenter(1 / 1.2);
  document.getElementById("zfit").onclick = () => fitView();

  document.getElementById("up").addEventListener("change", e => {
    genUp = parseInt(e.target.value, 10); render();
  });
  document.getElementById("down").addEventListener("change", e => {
    genDown = parseInt(e.target.value, 10); render();
  });

  /* --------------------------------------------------------------------- *
   * Search                                                                *
   * --------------------------------------------------------------------- */
  const q = document.getElementById("q");
  const results = document.getElementById("results");
  const allPeople = Object.values(P);

  q.addEventListener("input", () => {
    const v = norm(q.value).trim();
    if(!v){ results.style.display = "none"; return; }
    const hits = allPeople
      .filter(p => norm(p.name).includes(v))
      .sort((a, b) => (a.birth || 9999) - (b.birth || 9999))
      .slice(0, 40);
    if(!hits.length){
      results.innerHTML = "";
      const none = el("div", null, T("no_results"));
      none.style.color = "#999";
      results.appendChild(none);
      results.style.display = "block"; return;
    }
    results.innerHTML = "";
    for(const p of hits){
      const d = document.createElement("div");
      d.innerHTML = esc(p.name) +
        "<span class='yrs'>" + esc(years(p)) + "</span>";
      d.onclick = () => {
        setFocus(p.id);
        results.style.display = "none";
        q.value = "";
      };
      results.appendChild(d);
    }
    results.style.display = "block";
  });
  document.addEventListener("click", e => {
    if(!document.getElementById("search").contains(e.target))
      results.style.display = "none";
  });
  q.addEventListener("keydown", e => {
    if(e.key === "Enter"){
      const first = results.querySelector("div[onclick], div");
      if(first && first.onclick) first.onclick();
    } else if(e.key === "Escape"){
      results.style.display = "none"; q.blur();
    }
  });

  window.addEventListener("resize", () => fitView());

  // Initial render.
  render();
})();
</script>
</body>
</html>
